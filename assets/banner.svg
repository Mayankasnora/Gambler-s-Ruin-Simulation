<svg width="860" height="180" viewBox="0 0 860 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="50%" stop-color="#f5d27a"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="redGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="greenGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="860" height="180" fill="url(#bgGrad)" rx="12"/>

  <!-- Subtle grid -->
  <g opacity="0.07" stroke="#c9a84c" stroke-width="0.5">
    <line x1="0" y1="30" x2="860" y2="30"/>
    <line x1="0" y1="60" x2="860" y2="60"/>
    <line x1="0" y1="90" x2="860" y2="90"/>
    <line x1="0" y1="120" x2="860" y2="120"/>
    <line x1="0" y1="150" x2="860" y2="150"/>
    <line x1="86" y1="0" x2="86" y2="180"/>
    <line x1="172" y1="0" x2="172" y2="180"/>
    <line x1="258" y1="0" x2="258" y2="180"/>
    <line x1="344" y1="0" x2="344" y2="180"/>
    <line x1="430" y1="0" x2="430" y2="180"/>
    <line x1="516" y1="0" x2="516" y2="180"/>
    <line x1="602" y1="0" x2="602" y2="180"/>
    <line x1="688" y1="0" x2="688" y2="180"/>
    <line x1="774" y1="0" x2="774" y2="180"/>
  </g>

  <!-- WIN boundary line (top) -->
  <line x1="30" y1="35" x2="830" y2="35" stroke="#52e09a" stroke-width="1.2" stroke-dasharray="8,5" opacity="0.7"/>
  <text x="840" y="39" font-family="monospace" font-size="9" fill="#52e09a" opacity="0.9">WIN</text>

  <!-- RUIN boundary line (bottom) -->
  <line x1="30" y1="145" x2="830" y2="145" stroke="#e05252" stroke-width="1.2" stroke-dasharray="8,5" opacity="0.7"/>
  <text x="838" y="149" font-family="monospace" font-size="9" fill="#e05252" opacity="0.9">RUIN</text>

  <!-- Random walk path with SMIL animation -->
  <polyline
    points="30,90 50,78 70,92 90,68 110,82 130,56 150,74 170,88 190,62 210,80 230,50 250,70 270,88 290,60 310,76 330,94 350,65 370,82 390,55 410,75 430,95 450,62 470,80 490,52 510,72 530,90 550,58 570,78 590,95 610,62 630,82 650,48 670,70 690,88 710,55 730,78 750,95 770,60 790,82 810,50 830,72"
    fill="none" stroke="#c9a84c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
    stroke-dasharray="900" stroke-dashoffset="900" opacity="0.6">
    <animate attributeName="stroke-dashoffset" from="900" to="0" dur="4s" begin="0s" fill="freeze" calcMode="linear"/>
  </polyline>

  <!-- Moving dot on walk -->
  <circle r="4" fill="#f5d27a" opacity="0.9" filter="url(#softGlow)">
    <animateMotion dur="4s" fill="freeze" calcMode="linear">
      <mpath href="#walkPath"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;1" dur="0.3s" fill="freeze"/>
  </circle>
  <path id="walkPath" d="M30,90 L50,78 L70,92 L90,68 L110,82 L130,56 L150,74 L170,88 L190,62 L210,80 L230,50 L250,70 L270,88 L290,60 L310,76 L330,94 L350,65 L370,82 L390,55 L410,75 L430,95 L450,62 L470,80 L490,52 L510,72 L530,90 L550,58 L570,78 L590,95 L610,62 L630,82 L650,48 L670,70 L690,88 L710,55 L730,78 L750,95 L770,60 L790,82 L810,50 L830,72" fill="none"/>

  <!-- Spinning dice (top-left) -->
  <g>
    <animateTransform attributeName="transform" type="rotate" values="0 44 30; 360 44 30" dur="7s" repeatCount="indefinite" additive="sum"/>
    <rect x="34" y="20" width="20" height="20" rx="3" fill="#1a0a2e" stroke="#c9a84c" stroke-width="1.5" opacity="0.85"/>
    <circle cx="40" cy="26" r="1.8" fill="#f5d27a"/>
    <circle cx="48" cy="34" r="1.8" fill="#f5d27a"/>
    <circle cx="48" cy="26" r="1.8" fill="#f5d27a"/>
    <circle cx="40" cy="34" r="1.8" fill="#f5d27a"/>
  </g>

  <!-- Pulsing coin (top-right) -->
  <g transform="translate(808, 28)">
    <ellipse cx="0" cy="0" rx="14" ry="14" fill="#1a0a2e" stroke="#c9a84c" stroke-width="1.8" opacity="0.85">
      <animate attributeName="rx" values="14;3;14" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.85;0.4;0.85" dur="1.8s" repeatCount="indefinite"/>
    </ellipse>
    <text x="0" y="5" text-anchor="middle" font-family="serif" font-size="14" fill="#f5d27a" font-weight="bold">$</text>
  </g>

  <!-- Title text -->
  <text x="430" y="108" text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="40" font-weight="bold"
    fill="url(#goldGrad)"
    filter="url(#softGlow)"
    letter-spacing="2" opacity="0">
    Gambler's Ruin
    <animate attributeName="opacity" values="0;1" dur="0.8s" begin="0.8s" fill="freeze"/>
  </text>

  <!-- Subtitle -->
  <text x="430" y="133" text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="13" fill="#9d8ec9" letter-spacing="6" opacity="0">
    SIMULATION
    <animate attributeName="opacity" values="0;1" dur="0.8s" begin="1.5s" fill="freeze"/>
  </text>

  <!-- Blinking cursor after SIMULATION -->
  <rect x="594" y="122" width="9" height="2" fill="#9d8ec9" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0s" begin="2.3s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0;1" dur="0.9s" begin="2.3s" repeatCount="indefinite"/>
  </rect>

  <!-- Gold underline that grows -->
  <rect x="430" y="162" width="0" height="2" fill="url(#goldGrad)" rx="1" opacity="0.8">
    <animate attributeName="width" from="0" to="540" dur="1.5s" begin="1.2s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    <animate attributeName="x" from="430" to="160" dur="1.5s" begin="1.2s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>
</svg>
