<svg width="860" height="110" viewBox="0 0 860 110" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="footBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="50%" stop-color="#f5d27a"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="860" height="110" fill="url(#footBg)" rx="12"/>

  <!-- Top gold divider line -->
  <rect x="0" y="0" width="860" height="2" fill="url(#goldGrad)" opacity="0.5" rx="1"/>

  <!-- ── LEFT: animated probability bar chart ── -->
  <!-- p=0.30 bar -->
  <rect x="55" y="75" width="14" height="0" fill="#e05252" rx="2" opacity="0.9">
    <animate attributeName="height" from="0" to="48" dur="0.6s" begin="0.2s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    <animate attributeName="y" from="75" to="27" dur="0.6s" begin="0.2s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>
  <text x="62" y="88" text-anchor="middle" font-family="monospace" font-size="7" fill="#e05252" opacity="0">
    .30
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.8s" fill="freeze"/>
  </text>

  <!-- p=0.40 bar -->
  <rect x="75" y="75" width="14" height="0" fill="#e07c52" rx="2" opacity="0.9">
    <animate attributeName="height" from="0" to="34" dur="0.6s" begin="0.4s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    <animate attributeName="y" from="75" to="41" dur="0.6s" begin="0.4s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>
  <text x="82" y="88" text-anchor="middle" font-family="monospace" font-size="7" fill="#e07c52" opacity="0">
    .40
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.0s" fill="freeze"/>
  </text>

  <!-- p=0.50 bar -->
  <rect x="95" y="75" width="14" height="0" fill="#c9a84c" rx="2" opacity="0.9">
    <animate attributeName="height" from="0" to="22" dur="0.6s" begin="0.6s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    <animate attributeName="y" from="75" to="53" dur="0.6s" begin="0.6s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>
  <text x="102" y="88" text-anchor="middle" font-family="monospace" font-size="7" fill="#c9a84c" opacity="0">
    .50
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.2s" fill="freeze"/>
  </text>

  <!-- p=0.60 bar -->
  <rect x="115" y="75" width="14" height="0" fill="#7ab852" rx="2" opacity="0.9">
    <animate attributeName="height" from="0" to="12" dur="0.6s" begin="0.8s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    <animate attributeName="y" from="75" to="63" dur="0.6s" begin="0.8s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>
  <text x="122" y="88" text-anchor="middle" font-family="monospace" font-size="7" fill="#7ab852" opacity="0">
    .60
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.4s" fill="freeze"/>
  </text>

  <!-- p=0.70 bar -->
  <rect x="135" y="75" width="14" height="0" fill="#52e09a" rx="2" opacity="0.9">
    <animate attributeName="height" from="0" to="5" dur="0.6s" begin="1.0s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    <animate attributeName="y" from="75" to="70" dur="0.6s" begin="1.0s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </rect>
  <text x="142" y="88" text-anchor="middle" font-family="monospace" font-size="7" fill="#52e09a" opacity="0">
    .70
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.6s" fill="freeze"/>
  </text>

  <!-- X axis line -->
  <line x1="48" y1="76" x2="158" y2="76" stroke="#3a2a5e" stroke-width="1"/>

  <!-- Chart label -->
  <text x="103" y="100" text-anchor="middle" font-family="monospace" font-size="8" fill="#5a4a7e">P(ruin) vs win prob</text>
  <text x="42" y="52" text-anchor="middle" font-family="monospace" font-size="8" fill="#5a4a7e" transform="rotate(-90 42 52)">P(ruin)</text>

  <!-- Vertical divider left -->
  <line x1="175" y1="12" x2="175" y2="98" stroke="#3a2a5e" stroke-width="1"/>

  <!-- ── CENTER: quote text ── -->
  <text x="430" y="42" text-anchor="middle"
    font-family="Georgia, serif" font-size="15"
    fill="url(#goldGrad)" letter-spacing="0.5" opacity="0">
    "In the long run, the house always wins."
    <animate attributeName="opacity" values="0;1" dur="1s" begin="0.5s" fill="freeze"/>
  </text>
  <text x="430" y="63" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="10"
    fill="#9d8ec9" letter-spacing="1" opacity="0">
    — Unless you understand the math.
    <animate attributeName="opacity" values="0;1" dur="1s" begin="1s" fill="freeze"/>
  </text>
  <text x="430" y="84" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="9"
    fill="#5a4a7e" opacity="0">
    Built by Mayank Asnora · Stochastic Simulations · Python
    <animate attributeName="opacity" values="0;1" dur="1s" begin="1.5s" fill="freeze"/>
  </text>

  <!-- Blinking cursor -->
  <rect x="605" y="73" width="7" height="1.5" fill="#5a4a7e" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0s" begin="2.5s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0;1" dur="1s" begin="2.5s" repeatCount="indefinite"/>
  </rect>

  <!-- Vertical divider right -->
  <line x1="685" y1="12" x2="685" y2="98" stroke="#3a2a5e" stroke-width="1"/>

  <!-- ── RIGHT: rotating coin ── -->
  <g transform="translate(772, 55)">
    <!-- Outer ring pulse -->
    <circle cx="0" cy="0" r="30" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.2">
      <animate attributeName="r" values="30;34;30" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.05;0.2" dur="2s" repeatCount="indefinite"/>
    </circle>
    <!-- Coin body (flipping ellipse) -->
    <ellipse cx="0" cy="0" rx="22" ry="22" fill="#1a0a2e" stroke="#c9a84c" stroke-width="2" opacity="0.9">
      <animate attributeName="rx" values="22;3;22;3;22" dur="3s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Dollar sign -->
    <text x="0" y="7" text-anchor="middle" font-family="serif" font-size="22" fill="#f5d27a" font-weight="bold">$</text>
    <!-- Slow orbit rotation -->
    <animateTransform attributeName="transform" type="rotate" values="0 772 55; 360 772 55" dur="12s" repeatCount="indefinite" additive="sum"/>
  </g>
</svg>
